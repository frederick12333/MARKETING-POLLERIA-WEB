<div class="admin-page">

  <div class="admin-page-header">
    <div>
      <h1 class="admin-page-title">Clientes</h1>
      <p class="admin-page-sub">{{ filtrados.length }} cliente(s) registrado(s)</p>
    </div>
  </div>

  <div class="admin-toolbar">
    <div class="admin-search-wrap">
      <i class="bi bi-search admin-search-icon"></i>
      <input
        type="text"
        class="admin-search"
        placeholder="Buscar por nombre, correo o celular..."
        [(ngModel)]="busqueda"
        (ngModelChange)="onBusqueda()">
    </div>
  </div>

  <div class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Correo</th>
          <th>Celular</th>
          <th>Fecha de registro</th>
        </tr>
      </thead>
      <tbody>
        @if (filtrados.length === 0) {
          <tr><td colspan="4" class="table-empty">Sin clientes registrados</td></tr>
        }
        @for (c of filtrados; track c.id) {
          <tr>
            <td>
              <div class="cli-cell">
                <div class="cli-avatar">{{ getInicial(c.nombre) }}</div>
                <span class="cli-nombre">{{ c.nombre }}</span>
              </div>
            </td>
            <td>
              <span class="cli-correo">{{ c.correo }}</span>
            </td>
            <td>
              <span class="cli-celular">{{ c.celular }}</span>
            </td>
            <td>
              <span class="cli-fecha">{{ c.fechaRegistro }}</span>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

</div>
