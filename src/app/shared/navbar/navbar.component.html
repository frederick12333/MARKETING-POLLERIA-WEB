<nav class="navbar navbar-expand-lg fixed-top" [class.scrolled]="scrolled">
  <div class="container">
    <!-- Logo -->
    <a class="navbar-brand" routerLink="/">
      <div class="brand-logo">
        <span class="brand-icon">🍗</span>
        <div class="brand-text">
          <span class="brand-name">El Chino</span>
          <span class="brand-sub">Pollería</span>
        </div>
      </div>
    </a>

    <!-- Botón hamburguesa -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navMenu"
      aria-controls="navMenu"
      aria-expanded="false"
      aria-label="Toggle navigation">
      <span class="toggler-icon">
        <i class="bi bi-list"></i>
      </span>
    </button>

    <!-- Links -->
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
            <i class="bi bi-house-door"></i> Inicio
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/carta" routerLinkActive="active">
            <i class="bi bi-journal-text"></i> Carta
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/promociones" routerLinkActive="active">
            <i class="bi bi-tags"></i> Promociones
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/contacto" routerLinkActive="active">
            <i class="bi bi-geo-alt"></i> Contacto
          </a>
        </li>
      </ul>

      <!-- Carrito -->
      <button class="btn-carrito" (click)="abrirCarrito()">
        <i class="bi bi-bag-heart"></i>
        <span class="carrito-label">Mi Pedido</span>
        @if (cantidadCarrito > 0) {
          <span class="carrito-badge">{{ cantidadCarrito }}</span>
        }
      </button>
    </div>
  </div>
</nav>

<!-- Espaciado para compensar navbar fixed -->
<div class="navbar-spacer"></div>
